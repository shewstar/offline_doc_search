<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Offline PDF Search</title>
<style>
  :root {
    --bg: #f6f7f9; --panel: #fff; --ink: #1c2330; --muted: #6b7686;
    --line: #e3e7ec; --accent: #2563eb; --mark: #fff2a8;
    --badge-ocr: #b45309; --badge-native: #047857;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 system-ui, sans-serif; color: var(--ink);
         background: var(--bg); height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--panel); border-bottom: 1px solid var(--line);
           padding: 10px 16px; display: flex; gap: 16px; align-items: center; }
  header h1 { font-size: 15px; margin: 0; font-weight: 650; }
  header .stats { color: var(--muted); font-size: 12px; }
  .index-bar { margin-left: auto; display: flex; gap: 6px; align-items: center; }
  input, select, button { font: inherit; }
  input[type=text] { padding: 7px 10px; border: 1px solid var(--line);
                     border-radius: 7px; background: #fff; }
  button { padding: 7px 12px; border: 1px solid var(--line); border-radius: 7px;
           background: #fff; cursor: pointer; }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button:disabled { opacity: .5; cursor: default; }
  main { flex: 1; display: flex; min-height: 0; }
  .left { width: 46%; min-width: 360px; border-right: 1px solid var(--line);
          display: flex; flex-direction: column; }
  .searchrow { padding: 12px 16px; background: var(--panel);
               border-bottom: 1px solid var(--line); }
  .searchrow input#q { width: 100%; font-size: 15px; padding: 10px 12px; }
  .filters { display: flex; gap: 8px; margin-top: 8px; align-items: center;
             color: var(--muted); font-size: 12px; }
  .filters input, .filters select { padding: 5px 8px; font-size: 12px; }
  .meta { padding: 6px 16px; color: var(--muted); font-size: 12px;
          border-bottom: 1px solid var(--line); }
  .results { overflow-y: auto; flex: 1; }
  .hit { padding: 11px 16px; border-bottom: 1px solid var(--line); cursor: pointer; }
  .hit:hover { background: #eef3ff; }
  .hit.active { background: #e0eaff; }
  .hit .top { display: flex; gap: 8px; align-items: baseline; }
  .hit .fn { font-weight: 600; }
  .hit .pg { color: var(--muted); font-size: 12px; }
  .badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 600;
           text-transform: uppercase; letter-spacing: .03em; }
  .badge.native { color: var(--badge-native); background: #d1fae5; }
  .badge.ocr { color: var(--badge-ocr); background: #fef3c7; }
  .hit .folder { color: var(--muted); font-size: 11px; margin-top: 1px;
                 white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hit .snip { margin-top: 5px; color: #2b3444; }
  .hit mark, .snip mark { background: var(--mark); padding: 0 1px; border-radius: 2px; }
  .empty { padding: 28px 16px; color: var(--muted); text-align: center; }
  .right { flex: 1; display: flex; flex-direction: column; background: #525860; }
  .viewer-head { background: var(--panel); border-bottom: 1px solid var(--line);
                 padding: 8px 14px; font-size: 12px; color: var(--muted);
                 display: flex; gap: 10px; align-items: center; }
  iframe { flex: 1; border: 0; width: 100%; background: #525860; }
  .placeholder { flex: 1; display: flex; align-items: center; justify-content: center;
                 color: #cfd4da; font-size: 13px; }
  .progress { display: none; background: var(--panel); border-bottom: 1px solid var(--line);
              padding: 8px 16px; gap: 12px; align-items: center; }
  .progress.on { display: flex; }
  .bar { flex: 1; height: 8px; background: #e7ebf1; border-radius: 6px; overflow: hidden; }
  .bar > i { display: block; height: 100%; width: 0%; background: var(--accent);
             transition: width .3s ease; }
  .bar.indeterminate > i { width: 35% !important; animation: slide 1.1s infinite ease-in-out; }
  @keyframes slide { 0% { margin-left: -35%; } 100% { margin-left: 100%; } }
  .progress .ptext { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .progress .pcur { font-size: 12px; color: var(--ink); max-width: 240px;
                    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>
<header>
  <h1>Offline PDF Search</h1>
  <span class="stats" id="stats">…</span>
  <div class="index-bar">
    <input type="text" id="folder" placeholder="folder to index…" size="22">
    <label style="font-size:12px;color:var(--muted)">
      <input type="checkbox" id="ocr"> OCR
    </label>
    <button id="indexBtn">Index</button>
  </div>
</header>

<div class="progress" id="progress">
  <span class="ptext" id="pphase">Indexing…</span>
  <div class="bar" id="bar"><i id="barfill"></i></div>
  <span class="pcur" id="pcur"></span>
  <span class="ptext" id="peta"></span>
</div>

<main>
  <div class="left">
    <div class="searchrow">
      <input type="text" id="q" placeholder="Search…  (use &quot;exact phrase&quot;, term*, AND/OR/NOT)" autofocus>
      <div class="filters">
        <span>filters:</span>
        <input type="text" id="fFolder" placeholder="folder contains…" size="16">
        <select id="fMethod">
          <option value="">any source</option>
          <option value="native">native</option>
          <option value="ocr">OCR</option>
        </select>
      </div>
    </div>
    <div class="meta" id="meta"></div>
    <div class="results" id="results">
      <div class="empty">Type to search your indexed PDFs.</div>
    </div>
  </div>

  <div class="right">
    <div class="viewer-head" id="viewerHead" style="display:none">
      <span id="viewerTitle"></span>
      <a id="rawLink" href="#" target="_blank" style="margin-left:auto">open raw</a>
    </div>
    <div class="placeholder" id="placeholder">Select a result to preview the page.</div>
    <iframe id="viewer" style="display:none"></iframe>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
let activeEl = null;

async function refreshStats() {
  try {
    const s = await (await fetch("/api/stats")).json();
    $("stats").textContent =
      `${s.documents} docs · ${s.pages} pages` +
      (s.ocr_pending ? ` · ${s.ocr_pending} OCR pending` : "");
  } catch { $("stats").textContent = ""; }
}

function debounce(fn, ms) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

async function runSearch() {
  const q = $("q").value.trim();
  const params = new URLSearchParams({ q });
  if ($("fFolder").value.trim()) params.set("folder", $("fFolder").value.trim());
  if ($("fMethod").value) params.set("method", $("fMethod").value);
  if (!q) {
    $("results").innerHTML = '<div class="empty">Type to search your indexed PDFs.</div>';
    $("meta").textContent = ""; return;
  }
  const res = await fetch("/api/search?" + params.toString());
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    $("meta").textContent = e.detail || "query error";
    $("results").innerHTML = ""; return;
  }
  const data = await res.json();
  $("meta").textContent = `${data.count} hit(s) · ${data.took_ms} ms`;
  if (!data.hits.length) {
    $("results").innerHTML = '<div class="empty">No matches.</div>'; return;
  }
  $("results").innerHTML = "";
  for (const h of data.hits) {
    const el = document.createElement("div");
    el.className = "hit";
    el.innerHTML =
      `<div class="top"><span class="fn"></span>` +
      `<span class="pg">p.${h.page_number}</span>` +
      `<span class="badge ${h.method}">${h.method}</span></div>` +
      `<div class="folder"></div><div class="snip">${h.snippet_html}</div>`;
    el.querySelector(".fn").textContent = h.filename;
    el.querySelector(".folder").textContent = h.folder;
    el.onclick = () => openDoc(h, el);
    $("results").appendChild(el);
  }
}

function openDoc(h, el) {
  if (activeEl) activeEl.classList.remove("active");
  el.classList.add("active"); activeEl = el;
  const url = `/api/file?id=${h.document_id}#page=${h.page_number}`;
  $("placeholder").style.display = "none";
  $("viewerHead").style.display = "flex";
  $("viewer").style.display = "block";
  $("viewer").src = url;
  $("viewerTitle").textContent = `${h.filename} — page ${h.page_number}`;
  $("rawLink").href = `/api/file?id=${h.document_id}`;
}

function fmtDuration(s) {
  if (s == null) return "—";
  s = Math.round(s);
  if (s < 60) return s + "s";
  const m = Math.floor(s / 60), r = s % 60;
  if (m < 60) return `${m}m ${r}s`;
  const h = Math.floor(m / 60);
  return `${h}h ${m % 60}m`;
}

function showProgress(on) {
  $("progress").classList.toggle("on", on);
}

function renderProgress(j) {
  const phaseLabel = {
    starting: "Starting…", scanning: "Scanning folder…",
    indexing: "Indexing…", done: "Done", error: "Error",
  }[j.phase] || "Working…";
  $("pphase").textContent = phaseLabel;

  const bar = $("bar"), fill = $("barfill");
  if (j.phase === "scanning" || (j.phase === "indexing" && !j.total_pages)) {
    bar.classList.add("indeterminate");          // unknown total yet
    $("peta").textContent = "";
  } else {
    bar.classList.remove("indeterminate");
    const pct = j.total_pages ? Math.min(100, 100 * j.pages_done / j.total_pages) : 0;
    fill.style.width = pct.toFixed(1) + "%";
    if (j.phase === "indexing") {
      $("peta").textContent =
        `${j.files_done}/${j.total_files} files · ${fmtDuration(j.elapsed_s)} elapsed` +
        (j.eta_s != null ? ` · ~${fmtDuration(j.eta_s)} left` : "");
    }
  }
  $("pcur").textContent = j.current_file || "";
}

let pollTimer = null;

async function pollStatus(jobId, btnOld) {
  let j;
  try {
    const res = await fetch("/api/index/status?job_id=" + jobId);
    if (!res.ok) throw new Error("status " + res.status);
    j = await res.json();
  } catch (e) {
    $("meta").textContent = "lost contact with index job"; finishIndex(btnOld); return;
  }
  renderProgress(j);

  if (j.state === "running") {
    pollTimer = setTimeout(() => pollStatus(jobId, btnOld), 800);
    return;
  }
  // Terminal: done or error.
  if (j.state === "error") {
    $("meta").textContent = "index error: " + (j.error || "unknown");
  } else {
    let msg = `indexed ${j.indexed}, skipped ${j.skipped}, deleted ${j.deleted}` +
              ` in ${fmtDuration(j.elapsed_s)}`;
    if (j.scanned_detected) msg += ` · ${j.scanned_detected} scanned`;
    if (j.ocr_done) msg += ` · ${j.ocr_done} OCR'd`;
    if (j.ocr_warning) msg += ` · ⚠ ${j.ocr_warning}`;
    $("meta").textContent = msg;
  }
  await refreshStats();
  runSearch();
  finishIndex(btnOld);
}

function finishIndex(btnOld) {
  if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
  showProgress(false);
  $("bar").classList.remove("indeterminate");
  $("indexBtn").disabled = false; $("indexBtn").textContent = btnOld;
}

async function doIndex() {
  const folder = $("folder").value.trim();
  if (!folder) return;
  const btnOld = $("indexBtn").textContent;
  $("indexBtn").disabled = true; $("indexBtn").textContent = "Indexing…";
  $("barfill").style.width = "0%";
  showProgress(true);
  renderProgress({ phase: "starting" });
  try {
    const res = await fetch("/api/index", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ folder, ocr: $("ocr").checked }),
    });
    const d = await res.json();
    if (!res.ok) {
      $("meta").textContent = d.detail || "index error";
      finishIndex(btnOld); return;
    }
    if (d.ocr_warning) $("meta").textContent = "⚠ " + d.ocr_warning;
    pollStatus(d.job_id, btnOld);
  } catch (e) {
    $("meta").textContent = "could not start indexing";
    finishIndex(btnOld);
  }
}

$("q").addEventListener("input", debounce(runSearch, 200));
$("fFolder").addEventListener("input", debounce(runSearch, 200));
$("fMethod").addEventListener("change", runSearch);
$("indexBtn").addEventListener("click", doIndex);
$("folder").addEventListener("keydown", (e) => { if (e.key === "Enter") doIndex(); });
refreshStats();
</script>
</body>
</html>
