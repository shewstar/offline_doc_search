<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Offline PDF Search</title>
<style>
  :root {
    --bg: #f6f7f9; --panel: #fff; --ink: #1c2330; --muted: #6b7686;
    --line: #e3e7ec; --accent: #2563eb; --mark: #fff2a8;
    --badge-ocr: #b45309; --badge-native: #047857;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 system-ui, sans-serif; color: var(--ink);
         background: var(--bg); height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--panel); border-bottom: 1px solid var(--line);
           padding: 10px 16px; display: flex; gap: 16px; align-items: center; }
  header h1 { font-size: 15px; margin: 0; font-weight: 650; }
  header .stats { color: var(--muted); font-size: 12px; }
  .index-bar { margin-left: auto; display: flex; gap: 6px; align-items: center; }
  input, select, button { font: inherit; }
  input[type=text] { padding: 7px 10px; border: 1px solid var(--line);
                     border-radius: 7px; background: #fff; }
  button { padding: 7px 12px; border: 1px solid var(--line); border-radius: 7px;
           background: #fff; cursor: pointer; }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button:disabled { opacity: .5; cursor: default; }
  main { flex: 1; display: flex; min-height: 0; }
  .left { width: 46%; min-width: 360px; border-right: 1px solid var(--line);
          display: flex; flex-direction: column; }
  .searchrow { padding: 12px 16px; background: var(--panel);
               border-bottom: 1px solid var(--line); }
  .searchrow input#q { width: 100%; font-size: 15px; padding: 10px 12px; }
  .filters { display: flex; gap: 8px; margin-top: 8px; align-items: center;
             color: var(--muted); font-size: 12px; }
  .filters input, .filters select { padding: 5px 8px; font-size: 12px; }
  .meta { padding: 6px 16px; color: var(--muted); font-size: 12px;
          border-bottom: 1px solid var(--line); }
  .results { overflow-y: auto; flex: 1; }
  .badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 600;
           text-transform: uppercase; letter-spacing: .03em; }
  .badge.native { color: var(--badge-native); background: #d1fae5; }
  .badge.ocr { color: var(--badge-ocr); background: #fef3c7; }
  .docgroup { border-bottom: 1px solid var(--line); }
  .dochead { padding: 10px 16px 6px; display: flex; gap: 8px; align-items: baseline;
             cursor: pointer; }
  .dochead:hover { background: #f0f4ff; }
  .dochead .fn { font-weight: 650; }
  .dochead .cnt { color: var(--muted); font-size: 12px; }
  .dochead .folder { color: var(--muted); font-size: 11px; margin-left: auto;
                     max-width: 45%; white-space: nowrap; overflow: hidden;
                     text-overflow: ellipsis; }
  .pagehit { padding: 6px 16px 8px 30px; cursor: pointer; display: flex; gap: 10px;
             align-items: baseline; border-top: 1px solid #f0f2f5; }
  .pagehit:hover { background: #eef3ff; }
  .pagehit.active { background: #e0eaff; }
  .pagehit .pg { color: var(--muted); font-size: 12px; flex: none; min-width: 34px; }
  .pagehit .snip { color: #2b3444; }
  .morepages { padding: 4px 16px 8px 30px; color: var(--muted); font-size: 11px; }
  mark { background: var(--mark); padding: 0 1px; border-radius: 2px; }
  .empty { padding: 28px 16px; color: var(--muted); text-align: center; }
  .right { flex: 1; display: flex; flex-direction: column; background: #525860; }
  .viewer-head { background: var(--panel); border-bottom: 1px solid var(--line);
                 padding: 8px 14px; font-size: 12px; color: var(--muted);
                 display: flex; gap: 10px; align-items: center; }
  iframe { flex: 1; border: 0; width: 100%; background: #525860; }
  .placeholder { flex: 1; display: flex; align-items: center; justify-content: center;
                 color: #cfd4da; font-size: 13px; }
  .progress { display: none; background: var(--panel); border-bottom: 1px solid var(--line);
              padding: 8px 16px; gap: 12px; align-items: center; }
  .progress.on { display: flex; }
  .bar { flex: 1; height: 8px; background: #e7ebf1; border-radius: 6px; overflow: hidden; }
  .bar > i { display: block; height: 100%; width: 0%; background: var(--accent);
             transition: width .3s ease; }
  .bar.indeterminate > i { width: 35% !important; animation: slide 1.1s infinite ease-in-out; }
  @keyframes slide { 0% { margin-left: -35%; } 100% { margin-left: 100%; } }
  .progress .ptext { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .progress .pcur { font-size: 12px; color: var(--ink); max-width: 240px;
                    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .issueslink { color: var(--accent); cursor: pointer; text-decoration: underline; }
  .overlay { position: fixed; inset: 0; background: rgba(20,26,38,.45);
             display: none; align-items: center; justify-content: center; z-index: 50; }
  .overlay.on { display: flex; }
  .modal { background: var(--panel); border-radius: 12px; width: 560px;
           max-width: 92vw; max-height: 80vh; display: flex; flex-direction: column;
           box-shadow: 0 12px 40px rgba(0,0,0,.3); overflow: hidden; }
  .modal h2 { font-size: 14px; margin: 0; padding: 14px 16px;
              border-bottom: 1px solid var(--line); }
  .modal .path { padding: 8px 16px; font-size: 12px; color: var(--muted);
                 background: #f6f8fb; border-bottom: 1px solid var(--line);
                 word-break: break-all; }
  .dirlist { overflow-y: auto; flex: 1; min-height: 180px; }
  .direntry { padding: 9px 16px; cursor: pointer; display: flex; gap: 8px;
              align-items: center; border-bottom: 1px solid #f0f2f5; }
  .direntry:hover { background: #eef3ff; }
  .direntry .ic { color: var(--muted); }
  .modal .foot { padding: 12px 16px; display: flex; gap: 8px; align-items: center;
                 border-top: 1px solid var(--line); }
  .modal .foot .note { color: var(--muted); font-size: 12px; margin-right: auto; }
  .issue { padding: 9px 16px; border-bottom: 1px solid #f0f2f5; font-size: 12px; }
  .issue .ev { font-weight: 600; }
  .issue .ev.encrypted { color: var(--badge-ocr); }
  .issue .ev.failed, .issue .ev.ocr_failed { color: #b91c1c; }
  .issue .p { color: var(--ink); word-break: break-all; }
  .issue .d { color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>Offline PDF Search</h1>
  <span class="stats" id="stats">…</span>
  <div class="index-bar">
    <input type="text" id="folder" placeholder="folder to index…" size="22">
    <button id="browseBtn">Browse…</button>
    <label style="font-size:12px;color:var(--muted)">
      <input type="checkbox" id="ocr"> OCR
    </label>
    <button id="indexBtn" class="primary">Index</button>
  </div>
</header>

<div class="progress" id="progress">
  <span class="ptext" id="pphase">Indexing…</span>
  <div class="bar" id="bar"><i id="barfill"></i></div>
  <span class="pcur" id="pcur"></span>
  <span class="ptext" id="peta"></span>
</div>

<main>
  <div class="left">
    <div class="searchrow">
      <input type="text" id="q" placeholder="Search…  (use &quot;exact phrase&quot;, term*, AND/OR/NOT)" autofocus>
      <div class="filters">
        <span>filters:</span>
        <input type="text" id="fFolder" placeholder="folder contains…" size="16">
        <select id="fMethod">
          <option value="">any source</option>
          <option value="native">native</option>
          <option value="ocr">OCR</option>
        </select>
      </div>
    </div>
    <div class="meta" id="meta"></div>
    <div class="results" id="results">
      <div class="empty">Type to search your indexed PDFs.</div>
    </div>
  </div>

  <div class="right">
    <div class="viewer-head" id="viewerHead" style="display:none">
      <span id="viewerTitle"></span>
      <a id="rawLink" href="#" target="_blank" style="margin-left:auto">open raw</a>
    </div>
    <div class="placeholder" id="placeholder">Select a result to preview the page.</div>
    <iframe id="viewer" style="display:none"></iframe>
  </div>
</main>

<div class="overlay" id="browseOverlay">
  <div class="modal">
    <h2>Choose a folder to index</h2>
    <div class="path" id="browsePath">…</div>
    <div class="dirlist" id="dirlist"></div>
    <div class="foot">
      <span class="note" id="browseNote"></span>
      <button id="browseCancel">Cancel</button>
      <button class="primary" id="browseUse">Use this folder</button>
    </div>
  </div>
</div>

<div class="overlay" id="issuesOverlay">
  <div class="modal">
    <h2>Indexing issues</h2>
    <div class="dirlist" id="issueslist"></div>
    <div class="foot">
      <span class="note">Encrypted, corrupted, or OCR-failed files.</span>
      <button class="primary" id="issuesClose">Close</button>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let activeEl = null;

async function refreshStats() {
  try {
    const s = await (await fetch("/api/stats")).json();
    $("stats").textContent =
      `${s.documents} docs · ${s.pages} pages` +
      (s.ocr_pending ? ` · ${s.ocr_pending} OCR pending` : "");
  } catch { $("stats").textContent = ""; }
}

function debounce(fn, ms) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

async function runSearch() {
  const q = $("q").value.trim();
  const params = new URLSearchParams({ q });
  if ($("fFolder").value.trim()) params.set("folder", $("fFolder").value.trim());
  if ($("fMethod").value) params.set("method", $("fMethod").value);
  if (!q) {
    $("results").innerHTML = '<div class="empty">Type to search your indexed PDFs.</div>';
    $("meta").textContent = ""; return;
  }
  const res = await fetch("/api/search?" + params.toString());
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    $("meta").textContent = e.detail || "query error";
    $("results").innerHTML = ""; return;
  }
  const data = await res.json();
  $("meta").textContent =
    `${data.doc_count} document(s) · ${data.page_count} page hit(s) · ${data.took_ms} ms`;
  if (!data.documents.length) {
    $("results").innerHTML = '<div class="empty">No matches.</div>'; return;
  }
  $("results").innerHTML = "";
  for (const doc of data.documents) {
    const group = document.createElement("div");
    group.className = "docgroup";

    const head = document.createElement("div");
    head.className = "dochead";
    const matchLabel = doc.matched_pages === 1 ? "1 page" : `${doc.matched_pages} pages`;
    head.innerHTML =
      `<span class="fn"></span>` +
      `<span class="badge ${doc.method}">${doc.method}</span>` +
      `<span class="cnt">${matchLabel}</span>` +
      `<span class="folder"></span>`;
    head.querySelector(".fn").textContent = doc.filename;
    head.querySelector(".folder").textContent = doc.folder;
    group.appendChild(head);

    let firstRow = null;
    for (const pg of doc.pages) {
      const row = document.createElement("div");
      row.className = "pagehit";
      row.innerHTML = `<span class="pg">p.${pg.page_number}</span>` +
                      `<span class="snip">${pg.snippet_html}</span>`;
      row.onclick = () => openPage(doc, pg.page_number, row);
      group.appendChild(row);
      if (!firstRow) firstRow = row;
    }
    if (doc.more > 0) {
      const more = document.createElement("div");
      more.className = "morepages";
      more.textContent = `+${doc.more} more matching page${doc.more === 1 ? "" : "s"}`;
      group.appendChild(more);
    }
    // Clicking the document header opens its best-matching page.
    head.onclick = () => openPage(doc, doc.pages[0].page_number, firstRow);
    $("results").appendChild(group);
  }
}

function openPage(doc, pageNumber, el) {
  if (activeEl) activeEl.classList.remove("active");
  if (el) { el.classList.add("active"); activeEl = el; }
  const url = `/api/file?id=${doc.document_id}#page=${pageNumber}`;
  $("placeholder").style.display = "none";
  $("viewerHead").style.display = "flex";
  $("viewer").style.display = "block";
  $("viewer").src = url;
  $("viewerTitle").textContent = `${doc.filename} — page ${pageNumber}`;
  $("rawLink").href = `/api/file?id=${doc.document_id}`;
}

function fmtDuration(s) {
  if (s == null) return "—";
  s = Math.round(s);
  if (s < 60) return s + "s";
  const m = Math.floor(s / 60), r = s % 60;
  if (m < 60) return `${m}m ${r}s`;
  const h = Math.floor(m / 60);
  return `${h}h ${m % 60}m`;
}

function showProgress(on) {
  $("progress").classList.toggle("on", on);
}

function renderProgress(j) {
  const phaseLabel = {
    starting: "Starting…", scanning: "Scanning folder…",
    indexing: "Indexing…", done: "Done", error: "Error",
  }[j.phase] || "Working…";
  $("pphase").textContent = phaseLabel;

  const bar = $("bar"), fill = $("barfill");
  if (j.phase === "scanning" || (j.phase === "indexing" && !j.total_pages)) {
    bar.classList.add("indeterminate");          // unknown total yet
    $("peta").textContent = "";
  } else {
    bar.classList.remove("indeterminate");
    const pct = j.total_pages ? Math.min(100, 100 * j.pages_done / j.total_pages) : 0;
    fill.style.width = pct.toFixed(1) + "%";
    if (j.phase === "indexing") {
      $("peta").textContent =
        `${j.files_done}/${j.total_files} files · ${fmtDuration(j.elapsed_s)} elapsed` +
        (j.eta_s != null ? ` · ~${fmtDuration(j.eta_s)} left` : "");
    }
  }
  $("pcur").textContent = j.current_file || "";
}

let pollTimer = null;

async function pollStatus(jobId, btnOld) {
  let j;
  try {
    const res = await fetch("/api/index/status?job_id=" + jobId);
    if (!res.ok) throw new Error("status " + res.status);
    j = await res.json();
  } catch (e) {
    $("meta").textContent = "lost contact with index job"; finishIndex(btnOld); return;
  }
  renderProgress(j);

  if (j.state === "running") {
    pollTimer = setTimeout(() => pollStatus(jobId, btnOld), 800);
    return;
  }
  // Terminal: done or error.
  if (j.state === "error") {
    $("meta").textContent = "index error: " + (j.error || "unknown");
  } else {
    let msg = `indexed ${j.indexed}, skipped ${j.skipped}, deleted ${j.deleted}` +
              ` in ${fmtDuration(j.elapsed_s)}`;
    if (j.scanned_detected) msg += ` · ${j.scanned_detected} scanned`;
    if (j.ocr_done) msg += ` · ${j.ocr_done} OCR'd`;
    if (j.ocr_warning) msg += ` · ⚠ ${j.ocr_warning}`;
    $("meta").textContent = msg;
    const problems = (j.failed || 0) + (j.encrypted || 0);
    if (problems) {
      const link = document.createElement("span");
      link.className = "issueslink";
      link.style.marginLeft = "8px";
      link.textContent = `⚠ ${problems} issue${problems === 1 ? "" : "s"} — view`;
      link.onclick = openIssues;
      $("meta").appendChild(document.createTextNode(" "));
      $("meta").appendChild(link);
    }
  }
  await refreshStats();
  runSearch();
  finishIndex(btnOld);
}

function finishIndex(btnOld) {
  if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
  showProgress(false);
  $("bar").classList.remove("indeterminate");
  $("indexBtn").disabled = false; $("indexBtn").textContent = btnOld;
}

async function doIndex() {
  const folder = $("folder").value.trim();
  if (!folder) return;
  const btnOld = $("indexBtn").textContent;
  $("indexBtn").disabled = true; $("indexBtn").textContent = "Indexing…";
  $("barfill").style.width = "0%";
  showProgress(true);
  renderProgress({ phase: "starting" });
  try {
    const res = await fetch("/api/index", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ folder, ocr: $("ocr").checked }),
    });
    const d = await res.json();
    if (!res.ok) {
      $("meta").textContent = d.detail || "index error";
      finishIndex(btnOld); return;
    }
    if (d.ocr_warning) $("meta").textContent = "⚠ " + d.ocr_warning;
    pollStatus(d.job_id, btnOld);
  } catch (e) {
    $("meta").textContent = "could not start indexing";
    finishIndex(btnOld);
  }
}

// ---- Folder picker ----
let browseCurrent = "";

async function browseTo(path) {
  let data;
  try {
    data = await (await fetch("/api/browse?path=" + encodeURIComponent(path))).json();
  } catch { return; }
  browseCurrent = data.path;
  $("browsePath").textContent = data.path || "This PC (drives)";
  $("browseNote").textContent = data.path
    ? `${data.pdf_count} PDF${data.pdf_count === 1 ? "" : "s"} directly in this folder`
    : "Pick a drive to start";
  $("browseUse").disabled = !data.path;
  const list = $("dirlist");
  list.innerHTML = "";
  if (data.parent !== null) {
    const up = document.createElement("div");
    up.className = "direntry";
    up.innerHTML = `<span class="ic">↰</span><span>.. (up)</span>`;
    up.onclick = () => browseTo(data.parent);
    list.appendChild(up);
  }
  for (const d of data.dirs) {
    const row = document.createElement("div");
    row.className = "direntry";
    row.innerHTML = `<span class="ic">📁</span><span class="nm"></span>`;
    row.querySelector(".nm").textContent = d.name;
    row.onclick = () => browseTo(d.path);
    list.appendChild(row);
  }
  if (!data.dirs.length && data.parent !== null) {
    const none = document.createElement("div");
    none.className = "direntry"; none.style.color = "var(--muted)";
    none.textContent = "(no subfolders)";
    list.appendChild(none);
  }
}

function openBrowse() {
  $("browseOverlay").classList.add("on");
  browseTo($("folder").value.trim());
}
function closeBrowse() { $("browseOverlay").classList.remove("on"); }

// ---- Issues ----
async function openIssues() {
  $("issuesOverlay").classList.add("on");
  const list = $("issueslist");
  list.innerHTML = '<div class="issue">Loading…</div>';
  let data;
  try { data = await (await fetch("/api/issues")).json(); }
  catch { list.innerHTML = '<div class="issue">Could not load issues.</div>'; return; }
  if (!data.issues.length) {
    list.innerHTML = '<div class="issue">No recorded issues.</div>'; return;
  }
  list.innerHTML = "";
  for (const it of data.issues) {
    const el = document.createElement("div");
    el.className = "issue";
    el.innerHTML = `<span class="ev ${it.event}">${it.event}</span> ` +
                   `<span class="p"></span>` +
                   (it.detail ? `<div class="d"></div>` : "");
    el.querySelector(".p").textContent = it.path || "";
    if (it.detail) el.querySelector(".d").textContent = it.detail;
    list.appendChild(el);
  }
}
function closeIssues() { $("issuesOverlay").classList.remove("on"); }

$("q").addEventListener("input", debounce(runSearch, 200));
$("fFolder").addEventListener("input", debounce(runSearch, 200));
$("fMethod").addEventListener("change", runSearch);
$("indexBtn").addEventListener("click", doIndex);
$("folder").addEventListener("keydown", (e) => { if (e.key === "Enter") doIndex(); });
$("browseBtn").addEventListener("click", openBrowse);
$("browseCancel").addEventListener("click", closeBrowse);
$("browseUse").addEventListener("click", () => { $("folder").value = browseCurrent; closeBrowse(); });
$("issuesClose").addEventListener("click", closeIssues);
for (const id of ["browseOverlay", "issuesOverlay"]) {
  $(id).addEventListener("click", (e) => { if (e.target.id === id) e.target.classList.remove("on"); });
}
refreshStats();
</script>
</body>
</html>
